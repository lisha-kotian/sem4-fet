<!DOCTYPE html>
<html>
<head>
    <title>List Example</title>
</head>
<body>

    <!-- Ordered list outside -->
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>

    <main>
        <!-- Unordered list inside main -->
        <ul>
            <li>Apple</li>
            <li>Banana</li>
            <li>Cherry</li>
        </ul>
    </main>

</body>
</html>
